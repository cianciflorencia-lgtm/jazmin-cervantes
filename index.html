<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jazmin Cervantes Cisneros</title>
  <meta name="description" content="Marketing, analisis de mercado y estrategia comercial." />
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(0, 0, 0, 0.76);
      --button: #010101;
      --button-border: rgba(255, 255, 255, 0.045);
      --white: #ffffff;
      --soft: rgba(255, 255, 255, 0.72);
      --dim: rgba(255, 255, 255, 0.46);
      --line: rgba(255, 255, 255, 0.15);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.58);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 28%),
        radial-gradient(circle at 12% 34%, rgba(255, 255, 255, 0.035), transparent 22%),
        linear-gradient(180deg, #111111 0%, var(--bg) 46%, #000000 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    main {
      min-height: 100vh;
      padding: 32px 14px;
      display: grid;
      place-items: center;
    }

    .phone {
      position: relative;
      width: min(100%, 730px);
      min-height: min(100vh - 64px, 880px);
      padding: 24px 36px 30px;
      overflow: hidden;
      border-radius: 4px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 24%),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .circle-btn {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--white);
      background: rgba(0, 0, 0, 0.30);
    }

    .circle-btn svg,
    .social svg,
    .icon svg {
      width: 27px;
      height: 27px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mark {
      font-size: 42px;
      line-height: 0.7;
      font-weight: 900;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: -12px;
      margin-bottom: 36px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      margin-bottom: 26px;
      overflow: hidden;
      border-radius: 999px;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 50% 22%;
    }

    h1 {
      font-size: clamp(27px, 5vw, 34px);
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: -0.055em;
    }

    .subtitle {
      max-width: 420px;
      margin-top: 10px;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 620;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }

    .link-card {
      position: relative;
      min-height: 78px;
      display: grid;
      grid-template-columns: 58px 1fr 26px;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      border-radius: 11px;
      border: 1px solid var(--button-border);
      color: var(--white);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent),
        var(--button);
      text-decoration: none;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.18);
      background: #080808;
    }

    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: var(--white);
    }

    .label {
      text-align: center;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 820;
      letter-spacing: -0.05em;
    }

    .label small {
      display: block;
      margin-top: 4px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .dots {
      justify-self: end;
      display: grid;
      gap: 3px;
    }

    .dots span {
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
    }

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      margin-bottom: 24px;
    }

    .social {
      color: var(--white);
      text-decoration: none;
      transform: translateZ(0);
    }

    .social svg {
      width: 38px;
      height: 38px;
      stroke-width: 2.05;
    }

    .mini-pill {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 22px;
      border-radius: 999px;
      color: #111111;
      background: #ffffff;
      font-size: 18px;
      font-weight: 560;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .mini-pill span {
      display: block;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-pill svg {
      width: 18px;
      height: 18px;
      color: #333333;
    }

    .join {
      text-align: center;
      color: var(--white);
      font-size: 17px;
      line-height: 1.35;
      font-weight: 780;
    }

    @media (max-width: 560px) {
      main {
        padding: 0;
        place-items: stretch;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        padding: 32px 24px 28px;
        border-radius: 0;
      }

      .circle-btn {
        width: 50px;
        height: 50px;
      }

      .profile {
        margin-top: -10px;
        margin-bottom: 32px;
      }

      .avatar {
        width: 112px;
        height: 112px;
        margin-bottom: 24px;
      }

      .links {
        gap: 18px;
      }

      .link-card {
        min-height: 76px;
        grid-template-columns: 48px 1fr 22px;
        gap: 12px;
        padding: 16px 18px;
      }

      .icon {
        width: 38px;
        height: 38px;
      }

      .label {
        font-size: 19px;
      }

      .socials {
        gap: 22px;
      }
    }
  </style>
</head>
